name: CI - Run Pytest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DB_ROOT_USER: root
      DB_ROOT_PASSWORD: root
      DB_HOST: localhost
      DB_PORT: "3306"
      DB_USER: xposed_user
      DB_PWD: xposed_pass
      DB_NAME: xposed_db
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      mysql:
        image: mysql:8.0
        env:
          # MySQL image expects MYSQL_* names for container initialization.
          MYSQL_ROOT_PASSWORD: ${{ env.DB_ROOT_PASSWORD }}
          MYSQL_USER: ${{ env.DB_USER }}
          MYSQL_PASSWORD: ${{ env.DB_PWD }}
          MYSQL_DATABASE: ${{ env.DB_NAME }}
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file for tests
        run: |
          echo "SECRET_KEY=test-secret-key-for-ci" > .env
          echo "MODERATOR_PASSWORD=test-password" >> .env
          echo "DB_ROOT_USER=${DB_ROOT_USER}" >> .env
          echo "DB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}" >> .env
          echo "DB_HOST=${DB_HOST}" >> .env
          echo "DB_PORT=${DB_PORT}" >> .env
          echo "DB_USER=${DB_USER}" >> .env
          echo "DB_PWD=${DB_PWD}" >> .env
          echo "DB_NAME=${DB_NAME}" >> .env

      - name: Run tests with pytest
        run: pytest tests/ -v --tb=short
