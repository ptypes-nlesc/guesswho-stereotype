<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Speler 1 – Geheime Kaart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='mic-check.js') }}"></script>
    <script src="{{ url_for('static', filename='webrtc.js') }}"></script>
    <script src="{{ url_for('static', filename='recorder.js') }}"></script>
</head>

<body>
    <header>
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="height:80px;">
    </header>

    <main style="width: 100%; max-width: 700px; text-align: center;">
        <h2>Speler 1 – Geheime Kaart</h2>
        <div id="game-info" style="margin-bottom: 1em; color: #555;"></div>

        <div class="secret-card">
            <img src="{{ url_for('static', filename='cards/' + card.id|string + '.png') }}" alt="{{ card.name }}"
                class="secret-card-image">
                  </div>

        <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
            <h3 class="chat-title" style="align-self: flex-start;">Chat</h3>
            <div id="transcript"></div>

            <div class="chat-bar">
                <input type="text" id="chat-input" placeholder="Stuur een bericht naar alle deelnemers">
                <button id="send-btn">Versturen</button>
            </div>
        </div>

        <div class="voice-controls" style="margin-top: 10px;">
            <button id="voice-mute" type="button" disabled>Mute</button>
            <span id="voice-status" style="margin-left: 8px; color: #555;">spraak verbinden…</span>
            <span id="recording-status" style="margin-left: 12px;"></span>
        </div>
    </main>

    <script>
        // --- Setup -----------------------------------------------------
        const gameId = new URLSearchParams(window.location.search).get('game_id') || 'default';
        const participantId = new URLSearchParams(window.location.search).get('participant_id');
        document.getElementById('game-info').textContent = `Game ID: ${gameId}`;

        const transcriptDiv = document.getElementById('transcript');
        const chatInput = document.getElementById('chat-input');
        const socket = io();
        const socketReady = new Promise((resolve, reject) => {
            function joinRoom() {
                socket.emit('join', {game_id: gameId, role: 'player1', participant_id: participantId}, (ack) => {
                    if (ack && ack.status === 'error') {
                        console.error('Socket join failed:', ack.message);
                        reject(new Error(ack.message));
                        return;
                    }
                    resolve(ack || {status: 'ok'});
                });
            }
            if (socket.connected) joinRoom();
            else socket.once('connect', joinRoom);
        });

        function appendRoundCompleteMessage(message = 'Einde van de ronde') {
            const hasMessage = Array.from(transcriptDiv.querySelectorAll('[data-round-complete-message]'))
                .some(el => el.dataset.roundCompleteMessage === message);
            if (hasMessage) return;
            const div = document.createElement('div');
            div.setAttribute('data-round-complete-message', message);
            div.dataset.roundCompleteMessage = message;
            div.style = 'text-align: center; margin: 10px 0; padding: 10px; background: #ffebee; border-radius: 4px;';
            div.innerHTML = `<strong style="color: #d32f2f; font-size: 1.1em;"> ${message} </strong>`;
            transcriptDiv.appendChild(div);
            transcriptDiv.scrollTop = transcriptDiv.scrollHeight;
        }

        // Track seen joins by role to avoid duplicate join messages in UI
        const seenJoins = new Set();

        // --- Load chat history on page load -------------------------------
        fetch(`/transcript?game_id=${gameId}&limit=200`)
            .then(r => r.json())
            .then(arr => {
                arr.forEach(entry => {
                    if (entry.action === 'chat' && entry.text) {
                        appendMessage(`<b>${entry.role}:</b> ${entry.text}`);
                    } else if (entry.action === 'join') {
                        const key = `${entry.role}`;
                        if (!seenJoins.has(key)) {
                            seenJoins.add(key);
                            appendMessage(`<em>${entry.role || 'System'} joined game ${entry.game_id}</em>`, 'color:gray;');
                        }
                    } else if (entry.action === 'round_complete') {
                        appendRoundCompleteMessage(entry.text || 'Einde van de ronde');
                    }
                });
            })
            .catch(err => console.error('Failed to load transcript:', err));

        // --- Game Status Polling -----------------------------------------------
        let voice = null;
        let gameEnded = false;
        let consecutiveEndStateChecks = 0;
        const END_STATE_CONFIRMATION_THRESHOLD = 3;
        
        async function checkGameStatus() {
            try {
                const params = new URLSearchParams();
                params.append('game_id', gameId);
                if (participantId) {
                    params.append('participant_id', participantId);
                }
                const res = await fetch(`/game/status?${params}`);
                const data = await res.json();
                
                if (data.state === 'ENDED' || data.state === 'CLOSED') {
                    consecutiveEndStateChecks += 1;
                    if (consecutiveEndStateChecks < END_STATE_CONFIRMATION_THRESHOLD) {
                        return;
                    }

                    if (!gameEnded) {
                        gameEnded = true;
                        if (voice) voice.stopVoice();
                        // Disable interactions
                        document.getElementById('chat-input').disabled = true;
                        document.getElementById('send-btn').disabled = true;
                        document.getElementById('voice-mute').disabled = true;
                        document.getElementById('voice-mute').style.opacity = '0.6';
                        document.getElementById('voice-mute').style.cursor = 'not-allowed';
                        
                        // Make chat bar visually inactive
                        document.querySelector('.chat-bar').style.opacity = '0.6';
                        document.getElementById('send-btn').style.cursor = 'not-allowed';
                        
                        const endNotification = document.createElement('div');
                        endNotification.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff3cd; border: 2px solid #ffc107; padding: 30px; border-radius: 8px; text-align: center; font-size: 1.2em; font-weight: bold; color: #856404; z-index: 9999; width: 90%; max-width: 500px;';
                        
                        if (data.state === 'CLOSED' && data.message) {
                            endNotification.innerHTML = 'Deze spelsessie is beëindigd.<br><small style="font-size: 0.8em; display: block; margin-top: 10px;">Je kunt dit venster nu sluiten.</small>';
                        } else {
                            // Game ended normally
                            endNotification.innerHTML = 'Het spel is afgelopen. Bedankt voor het spelen! <br><small style="font-size: 0.8em; display: block; margin-top: 10px;">Je kunt dit venster nu sluiten.</small>';
                        }
                        
                        const main = document.querySelector('main');
                        if (main && !document.querySelector('[data-game-ended]')) {
                            main.appendChild(endNotification);
                            endNotification.setAttribute('data-game-ended', 'true');
                        }
                    }
                    
                    // Stop polling after game ends
                    if (gameStatusInterval) {
                        clearInterval(gameStatusInterval);
                    }
                } else {
                    consecutiveEndStateChecks = 0;
                }
            } catch (err) {
                console.error('Game status check failed:', err);
            }
        }
        
        // Check immediately on load
        checkGameStatus();
        
        // Then set up polling every 2 seconds
        const gameStatusInterval = setInterval(checkGameStatus, 2000);

        async function redirectToCurrentRole() {
            if (!participantId) return;
            try {
                const res = await fetch(`/join/status?participant_id=${encodeURIComponent(participantId)}`);
                const data = await res.json();
                if (data.status !== 'in_game' || data.game_id !== gameId || !data.role) return;
                const targetPath = data.role === 'player1' ? '/player1' : '/player2';
                if (window.location.pathname === targetPath) return;
                window.location.href = `${targetPath}?game_id=${encodeURIComponent(gameId)}&participant_id=${encodeURIComponent(participantId)}`;
            } catch (err) {
                console.error('Role redirect failed:', err);
            }
        }

        // --- Chat sending ----------------------------------------------
        const sendChat = () => {
            const text = chatInput.value.trim();
            if (!text) return;
            socket.emit('chat', {game_id: gameId, role: 'player1', text, participant_id: participantId});
            chatInput.value = '';
        };

        document.getElementById('send-btn').onclick = sendChat;
        chatInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendChat();
            }
        });

        // --- Helper to add transcript lines -----------------------------
        function appendMessage(msg, style = '') {
            const div = document.createElement('div');
            div.innerHTML = msg;
            if (style) div.style = style;
            transcriptDiv.appendChild(div);
            transcriptDiv.scrollTop = transcriptDiv.scrollHeight;
        }

        // --- Incoming messages ------------------------------------------
        socket.on('chat', data => {
            appendMessage(`<b>${data.role}:</b> ${data.text}`);
        });

        socket.on('system', data => {
            // Suppress duplicate join messages (same role appearing multiple times)
            if (data.action === 'join') {
                const key = `${data.role}`;
                if (seenJoins.has(key)) return;  // Already saw this role join
                seenJoins.add(key);
            } else {
                return;
            }
            appendMessage(`<em>${data.role || 'System'} joined game ${data.game_id}</em>`, 'color:gray;');
        });

        socket.on('round_complete', data => {
            appendRoundCompleteMessage(data?.message || 'Einde van de ronde');
        });

        socket.on('roles_swapped', data => {
            if (!data || data.game_id !== gameId) return;
            appendMessage('<em>Rollen gewisseld. Je wordt doorgestuurd naar ronde 2</em>', 'color:gray;');
            setTimeout(redirectToCurrentRole, 300);
        });

        // Player 1 does not receive elimination messages - only moderator and player2 should see them

        // --- Voice (WebRTC) -------------------------------------------
        voice = setupVoice({
            socket,
            socketReady,
            gameId,
            role: 'player1',
            muteButtonEl: document.getElementById('voice-mute'),
            statusEl: document.getElementById('voice-status'),
            muteLabels: { active: 'Mute', muted: 'Unmute', pending: 'Mute' },
            autoJoin: true,
        });

        // Local-mic capture only (separate stem per role). Upload comes later.
        const sessionRecorder = createSessionRecorder({
            socket,
            gameId,
            role: 'player1',
            participantId,
            getLocalStream: () => voice && voice.getLocalStream(),
            ensureLocalStream: () => voice && voice.ensureLocalStream(),
            statusEl: document.getElementById('recording-status'),
        });
        window.sessionRecorder = sessionRecorder;
    </script>
</body>

</html>
