site_name: GuessWho Stereotype
site_description: Documentation for moderators, participants, and developers

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: teal
      accent: amber

nav:
  - Home: index.md
  - User Guide: USAGE_GUIDE.md
  - API Reference: api.md
  - Roadmap: ROADMAP.md
  - Audio & Recording Plan: AUDIO_RECORDING_PLAN.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css
